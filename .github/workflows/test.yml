name: Node.js Package Test
concurrency:
  group: test-${{ github.event_name }}
  cancel-in-progress: true
on:
  workflow_dispatch: {}
  push:
    paths:
      - '**/test*/**'
      - '**/test*'
      - '**/src/**'
env:
  CI_NODE_VERSION: 24.16.0
  CI_PYTHON_VERSION: '3.11'
  ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN || secrets.GITHUB_TOKEN || github.token }}
  GH_TOKEN: ${{ secrets.ACCESS_TOKEN || secrets.GITHUB_TOKEN || github.token }}
jobs:
  ci:
    name: 🔨 Build, Pack & Test
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout workflow repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
      - name: ⬇️ Setup CI Environment
        uses: ./.github/actions/setup-environments
        with:
          node-version: ${{ env.CI_NODE_VERSION }}
          python-version: ${{ env.CI_PYTHON_VERSION }}
          token: ${{ secrets.ACCESS_TOKEN || secrets.GITHUB_TOKEN || github.token }}
          prefix-cache-key: ${{ runner.os }}-${{ github.event.repository.name }}-
      - name: 🔨 Build project
        run: corepack yarn build
      - name: 📦 Pack project
        run: corepack yarn pack
      - name: 🧹 Clean GitHub Actions Cache
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN || secrets.GITHUB_TOKEN || github.token }}
        shell: bash
        run: npx --legacy-peer-deps -y
          binary-collections@https://raw.githubusercontent.com/dimaslanjaka/bin/master/releases/bin.tgz
          clean-github-actions-caches --repo "${{ github.repository }}" --sha
          "${{ github.sha }}"
      - name: 🧪 Run tests in test/database/SQLiteMarker.test.ts
        id: run-test-database-SQLiteMarker-test-ts
        shell: bash
        run: >-
          if [ -f "test/database/SQLiteMarker.test.ts" ]; then
            node --experimental-vm-modules node_modules/jest/bin/jest.js --runInBand --forceExit --testTimeout=120000 --detectOpenHandles --bail=1 --testPathPatterns="database/SQLiteMarker.test.ts"
          else
            echo "Skipping missing test file: test/database/SQLiteMarker.test.ts"
          fi
      - name: 🧪 Run tests in test/database/proxydb-mysql.test.ts
        id: run-test-database-proxydb-mysql-test-ts
        shell: bash
        run: >-
          if [ -f "test/database/proxydb-mysql.test.ts" ]; then
            node --experimental-vm-modules node_modules/jest/bin/jest.js --runInBand --forceExit --testTimeout=120000 --detectOpenHandles --bail=1 --testPathPatterns="database/proxydb-mysql.test.ts"
          else
            echo "Skipping missing test file: test/database/proxydb-mysql.test.ts"
          fi
      - name: 🧪 Run tests in test/database/proxydb-sqlite.test.ts
        id: run-test-database-proxydb-sqlite-test-ts
        shell: bash
        run: >-
          if [ -f "test/database/proxydb-sqlite.test.ts" ]; then
            node --experimental-vm-modules node_modules/jest/bin/jest.js --runInBand --forceExit --testTimeout=120000 --detectOpenHandles --bail=1 --testPathPatterns="database/proxydb-sqlite.test.ts"
          else
            echo "Skipping missing test file: test/database/proxydb-sqlite.test.ts"
          fi

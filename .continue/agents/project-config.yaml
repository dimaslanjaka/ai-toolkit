name: Project Config
version: 1.0.0
schema: v1

mcpServers:
  # - name: "sqlite-database"
  #   command: "npx"
  #   args:
  #     - "-y"
  #     - "@modelcontextprotocol/server-sqlite"
  #     - "tmp/database/ai-toolkit.sqlite"

  # https://alphaonedev.github.io/ai-memory-mcp/#install
  # https://github.com/alphaonedev/ai-memory-mcp/tree/main
  - name: AI Memory
    type: stdio
    command: "ai-memory"
    args: ["--db", "~/.local/share/ai-memory/memories.db", "mcp", "--tier", "smart"]
    connectionTimeout: 120000

  # - name: Filesystem
  #   type: stdio
  #   command: "npx"
  #   args: ["-y", "@modelcontextprotocol/server-filesystem", "${workspaceFolder}"]
  #   connectionTimeout: 120000

  - name: Filesystem MCP server
    type: stdio
    command: npx
    args:
      - -y
      - fast-filesystem-mcp
    env:
      CREATE_BACKUP_FILES: "true"
    connectionTimeout: 120000

  - name: Web Search
    type: stdio
    command: npx
    args: ["-y", "@zhafron/mcp-web-search"]
    connectionTimeout: 120000

  # - name: Playwright
  #   command: npx
  #   args: ["-y", "@playwright/mcp@latest"]
  #   connectionTimeout: 120000

# Define which models can be used
# https://docs.continue.dev/customization/models
models:
  - name: My Autocomplete
    provider: openai
    model: auto
    apiBase: http://127.0.0.1:5758/v1
    apiKey: sk-c2aafb0983f2f86b-9gjb00-e3f39ea4
    useResponsesApi: false
    roles:
      - autocomplete
    autocompleteOptions:
      debounceDelay: 350
      maxPromptTokens: 1024
      onlyMyCode: true
  - name: 9Router Chat
    provider: openai
    model: gratisan
    apiBase: http://127.0.0.1:20128/v1
    apiKey: sk-c2aafb0983f2f86b-9gjb00-e3f39ea4
    useResponsesApi: false
    roles:
      - chat
      - edit
      - apply
    capabilities:
      - tool_use
